<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Three.js — Відео в 3D</title>
    <link rel="stylesheet" href="style.css" />
    <style>
        /* Додаткові стилі для цієї сторінки */
        #three-page {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: #0b0e14;
            position: relative;
        }

        #three-container {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* Кнопка "Назад" */
        .back-link {
            position: fixed;
            top: 25px;
            left: 25px;
            z-index: 100;
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(12px);
            padding: 12px 24px;
            border-radius: 40px;
            color: #ffffff;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            border: 1px solid rgba(255, 255, 255, 0.15);
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            letter-spacing: 0.3px;
        }

        .back-link:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: scale(1.05);
            border-color: rgba(255, 255, 255, 0.3);
        }

        /* Інформація внизу */
        .info-badge {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            padding: 10px 28px;
            border-radius: 40px;
            color: #94a3b8;
            font-size: 0.85rem;
            border: 1px solid rgba(255, 255, 255, 0.06);
            white-space: nowrap;
            letter-spacing: 0.5px;
        }

        .info-badge strong {
            color: #e2e8f0;
        }

        @media (max-width: 600px) {
            .back-link {
                top: 15px;
                left: 15px;
                padding: 8px 16px;
                font-size: 0.8rem;
            }
            .info-badge {
                font-size: 0.7rem;
                padding: 6px 16px;
                bottom: 15px;
            }
        }
    </style>
</head>
<body>

    <!-- ========================================== -->
    <!-- СТОРІНКА З THREE.JS                        -->
    <!-- ========================================== -->
    <div id="three-page">
        <div id="three-container"></div>

        <!-- Кнопка "Назад" -->
        <a href="index.html" class="back-link">
            ← Назад до завдань
        </a>
    </div>

    <!-- ========================================== -->
    <!-- ПІДКЛЮЧЕННЯ БІБЛІОТЕК                       -->
    <!-- ========================================== -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
            }
        }
    </script>

    <script type="module" src="script.js"></script>
</body>
</html>
